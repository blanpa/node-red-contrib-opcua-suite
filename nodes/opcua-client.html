<script type="text/javascript">
    RED.nodes.registerType("opcua-client", {
        category: "OPC UA Suite",
        color: "#3a8cba",
        defaults: {
            name: { value: "" },
            endpoint: { value: "", type: "opcua-endpoint", required: true },
            defaultOperation: { value: "read" },
            applicationName: { value: "Node-RED OPC UA Client" },
            maxReconnectAttempts: { value: 10 },
            reconnectDelay: { value: 5000 },
            retryAttempts: { value: 0 },
            maxOperationRetries: { value: 3 },
            retryBackoffMs: { value: 100 },
            verboseLog: { value: true },
            autoConnect: { value: true },
            unwrapSingle: { value: false },
        },
        inputs: 1,
        outputs: 1,
        icon: "opcua.svg",
        paletteLabel: "OPC UA Client",
        label: function () {
            return this.name || "OPC UA Client";
        },
        labelStyle: function () {
            return this.name ? "node_label_italic" : "";
        },
        oneditprepare: function () {
            // Toggle advanced section
            $("#opcua-client-toggle-advanced").on("click", function () {
                $("#opcua-client-advanced").slideToggle(200);
                $(this)
                    .find(".fa")
                    .toggleClass("fa-chevron-down fa-chevron-right");
            });
        },
    });
</script>

                <option value="browse">Browse</option>
                <option value="method">Method Call</option>

            <span style="font-size:11px;color:#999;margin-left:8px;">

            <div class="form-row">
                <label for="node-input-maxReconnectAttempts"

                    placeholder="5000"

            <div class="form-row">
                <label for="node-input-retryAttempts"

                <input
                    type="number"

            <div class="form-row">

            <div class="form-row">

                <input
                    type="number"
                    id="node-input-retryBackoffMs"
                    min="0"
                    max="5000"
                    style="width:100px;"
                    placeholder="100"
                />
                <span style="font-size:11px;color:#999;margin-left:4px"
                    >ms (exponential, capped at 2s)</span
                >
            </div>
        </div>
    </div>
</script>

<script type="text/html" data-help-name="opcua-client">
    <p>
        OPC UA Client Node — Read, Write, Subscribe, Browse (single and batch).
    </p>

    <h3>Operations</h3>
    <p>
        Via <code>msg.operation</code> or default operation in the
        configuration:
    </p>

    <h4>Read (single)</h4>
    <ul>
        <li><code>msg.topic</code> / <code>msg.nodeId</code> — NodeId</li>
        <li>Output: <code>msg.payload</code> = value</li>
    </ul>

    <h4>Read Multiple (Batch)</h4>
    <ul>
        <li><code>msg.operation = "readmultiple"</code></li>
        <li>
            <code>msg.items</code> — Array:
            <code>[{nodeId: "ns=2;s=Var1"}, ...]</code>
        </li>
        <li>
            Or <code>msg.payload</code> — Object:
            <code>{"Name": "ns=2;s=Var1", ...}</code>
        </li>
    </ul>

    <h4>Write (single)</h4>
    <ul>
        <li><code>msg.topic</code> / <code>msg.nodeId</code> — NodeId</li>
        <li>
            <code>msg.payload</code> — value (plain value or ExtensionObject,
            see below)
        </li>
        <li>
            <code>msg.datatype</code> — Optional: DataType (e.g. "Int32",
            "Double", "ExtensionObject")
        </li>
    </ul>

    <h4>Write Multiple (Batch)</h4>
    <ul>
        <li><code>msg.operation = "writemultiple"</code></li>
        <li>
            <code>msg.items</code> — Array:
            <code
                >[{nodeId: "ns=2;s=Var1", value: 42, datatype: "Int32"},
                ...]</code
            >
        </li>
        <li>
            Or <code>msg.payload</code> — Object:
            <code>{"ns=2;s=Var1": {value: 42, datatype: "Int32"}, ...}</code>
        </li>
    </ul>

    <h4>Subscribe / Browse / Method / History</h4>
    <p>See example flows for all supported operations.</p>

    <h3>Unwrap single value</h3>
    <p>
        A read that resolves to exactly one item (e.g. one Item node, or a
        single-entry <code>msg.items</code>) normally returns a one-element
        array in <code>msg.payload</code>. Enable <b>Unwrap single value</b> to
        receive the scalar value directly instead, with its metadata
        (<code>dataType</code>, <code>statusCode</code>, <code>nodeId</code>, …)
        flattened onto <code>msg</code>. Override per message with
        <code>msg.unwrapSingle = true | false</code>. Reads of two or more items
        are unaffected.
    </p>

    <h3>ExtensionObject (Structured Types) Support</h3>
    <p>
        OPC UA <b>ExtensionObjects</b> (structured/complex data types) are fully
        supported for read, write, and subscribe operations.
    </p>

    <h4>Reading ExtensionObjects</h4>
    <p>
        When reading a node whose value is an ExtensionObject, the structured
        data is automatically serialized to a plain JSON object in
        <code>msg.payload</code>. The <code>msg.dataType</code> will be
        <code>"ExtensionObject"</code>. A <code>_typeName</code> field indicates
        the OPC UA type name.
    </p>
    <p>
        If the server's type definition cannot be resolved, an opaque
        representation with base64-encoded raw bytes is returned (<code
            >_opaque: true</code
        >).
    </p>

    <h4>Writing ExtensionObjects</h4>
    <p>
        To write a structured type, set
        <code>msg.datatype = "ExtensionObject"</code> and provide:
    </p>
    <ul>
        <li>
            <code>msg.dataTypeNodeId</code> — The NodeId of the structured
            DataType definition (e.g. <code>"ns=2;i=3003"</code>)
        </li>
        <li>
            <code>msg.payload</code> — A plain JSON object with the field
            values: <code>{ field1: 42, field2: "hello" }</code>
        </li>
    </ul>
    <p>Example:</p>
    <pre>
msg = {
    operation: "write",
    nodeId: "ns=2;s=MyStructVar",
    datatype: "ExtensionObject",
    dataTypeNodeId: "ns=2;i=3003",
    payload: {
        temperature: 25.5,
        unit: "Celsius",
        timestamp: "2024-01-01T00:00:00Z"
    }
}</pre
    >
    <p>
        For batch writes, include <code>datatype: "ExtensionObject"</code> and
        <code>dataTypeNodeId</code> in each item object.
    </p>

    <h3>Item Collector Pattern</h3>
    <p>
        Chain <b>OPC UA Item</b> nodes in series before the client. Each item
        adds itself to the <code>msg.items</code> array for batch operations.
    </p>
</script>
