<script type="text/javascript">
  RED.nodes.registerType("opcua-browse-client", {
    category: "opcua",
    color: "#3a8cba",
    defaults: {
      name: { value: "" },
      endpoint: { value: "", type: "opcua-endpoint", required: true },
      mode: { value: "read" },
      publishInterval: { value: 1000, validate: RED.validators.number() },
      selectedItems: { value: [] },
    },
    inputs: 1,
    outputs: 1,
    icon: "opcua.svg",
    paletteLabel: "OPC UA Browse Client",
    label: function () {
      if (this.name) return this.name;
      var count = this.selectedItems ? this.selectedItems.length : 0;
      if (count === 0) return "OPC UA Browse Client";
      return (
        count + " item" + (count !== 1 ? "s" : "") + " (" + this.mode + ")"
      );
    },
    labelStyle: function () {
      return this.name ? "node_label_italic" : "";
    },
    oneditprepare: function () {
      var node = this;
      var selectedMap = {};
      (node.selectedItems || []).forEach(function (item) {
        selectedMap[item.nodeId] = JSON.parse(JSON.stringify(item));
      });
      // Share selectedMap with oneditsave via node object
      node._selectedMap = selectedMap;

      // ─── Icon / Color helpers ───

      var nodeClassMeta = {
        Object: { icon: "fa-cube", color: "#3a8cba" },
        Variable: { icon: "fa-tag", color: "#2e9e5a" },
        Method: { icon: "fa-cog", color: "#d4a017" },
        ObjectType: { icon: "fa-cubes", color: "#7c5cbf" },
        VariableType: { icon: "fa-tags", color: "#5c8abf" },
        ReferenceType: { icon: "fa-link", color: "#bf5c8a" },
        DataType: { icon: "fa-database", color: "#bf8a5c" },
        View: { icon: "fa-eye", color: "#5cbf8a" },
        ExtensionObject: { icon: "fa-puzzle-piece", color: "#e06c75" },
      };

      function isExtensionObject(ref) {
        return (
          ref.dataType &&
          typeof ref.dataType === "string" &&
          ref.dataType.indexOf("ExtensionObject") === 0
        );
      }

      function getMeta(nc) {
        return nodeClassMeta[nc] || { icon: "fa-circle-o", color: "#888" };
      }

      // ─── Mode toggle ───

      function updateModeUI() {
        var mode = $("#node-input-mode").val();
        if (mode === "subscribe") {
          $("#opcua-bc-interval-row").slideDown(150);
        } else {
          $("#opcua-bc-interval-row").slideUp(150);
        }
      }
      $("#node-input-mode").on("change", updateModeUI);
      updateModeUI();

      // ─── Selected items management ───

      function updateSelectedCount() {
        var count = Object.keys(selectedMap).length;
        $("#opcua-bc-selected-count").text(count);
        $("#opcua-bc-selected-badge").toggle(count > 0);
        $("#opcua-bc-clear-all").toggle(count > 0);
        updateSelectedList();
      }

      function updateSelectedList() {
        var $list = $("#opcua-bc-selected-list");
        $list.empty();
        var items = Object.values(selectedMap);
        if (items.length === 0) {
          $list.html(
            '<div class="opcua-bc-empty">No items selected. Browse the server and check items to select them.</div>',
          );
          return;
        }
        items.forEach(function (item) {
          var meta = getMeta(item.nodeClass);
          var $row = $('<div class="opcua-bc-selected-row"></div>');
          $row.append(
            '<span class="opcua-bc-sel-icon"><i class="fa ' +
              meta.icon +
              '" style="color:' +
              meta.color +
              '"></i></span>',
          );
          var $info = $('<div class="opcua-bc-sel-info"></div>');
          $info.append(
            $('<span class="opcua-bc-sel-name"></span>').text(
              item.displayName || item.browseName || "",
            ),
          );
          $info.append(
            $('<span class="opcua-bc-sel-detail"></span>').text(
              item.nodeClass + "  —  " + item.nodeId,
            ),
          );
          $row.append($info);
          var $remove = $(
            '<button type="button" class="opcua-bc-sel-remove red-ui-button red-ui-button-small"><i class="fa fa-times"></i></button>',
          );
          $remove.on("click", function () {
            delete selectedMap[item.nodeId];
            $("#opcua-bc-tree")
              .find('input[data-nodeid="' + CSS.escape(item.nodeId) + '"]')
              .prop("checked", false);
            updateSelectedCount();
          });
          $row.append($remove);
          $list.append($row);
        });
      }

      $("#opcua-bc-clear-all").on("click", function () {
        selectedMap = {};
        node._selectedMap = selectedMap;
        $("#opcua-bc-tree")
          .find('input[type="checkbox"]')
          .prop("checked", false);
        updateSelectedCount();
      });

      // ─── Search / Filter ───

      var filterTimeout = null;
      var isFiltering = false;

      $("#opcua-bc-search").on("input", function () {
        clearTimeout(filterTimeout);
        var term = $(this).val().toLowerCase().trim();
        filterTimeout = setTimeout(function () {
          if (!term) {
            isFiltering = false;
            // Restore: show all items, restore children to their pre-filter state
            $("#opcua-bc-tree .opcua-bc-tree-item").show();
            $("#opcua-bc-tree .opcua-bc-children").each(function () {
              var $child = $(this);
              var $arrow = $child
                .prev(".opcua-bc-tree-item")
                .find(".opcua-bc-expand .fa");
              // Collapse children that were force-opened by filter
              if ($child.data("filter-opened")) {
                $child.hide();
                $arrow
                  .removeClass("fa-chevron-down")
                  .addClass("fa-chevron-right");
                $child.removeData("filter-opened");
              }
            });
            return;
          }
          isFiltering = true;
          // First hide everything
          $("#opcua-bc-tree .opcua-bc-tree-item").hide();
          $("#opcua-bc-tree .opcua-bc-children")
            .hide()
            .removeData("filter-opened");

          // Show matching items and expand their parents
          $("#opcua-bc-tree .opcua-bc-tree-item").each(function () {
            var $item = $(this);
            var label = $item.find(".opcua-bc-node-label").text().toLowerCase();
            var nodeId = ($item.attr("title") || "").toLowerCase();
            var nodeClass = $item
              .find(".opcua-bc-node-class")
              .text()
              .toLowerCase();
            if (
              label.indexOf(term) >= 0 ||
              nodeId.indexOf(term) >= 0 ||
              nodeClass.indexOf(term) >= 0
            ) {
              $item.show();
              $item.parents(".opcua-bc-children").each(function () {
                var $parent = $(this);
                if (!$parent.is(":visible")) {
                  $parent.show().data("filter-opened", true);
                }
                $parent
                  .prev(".opcua-bc-tree-item")
                  .show()
                  .find(".opcua-bc-expand .fa")
                  .removeClass("fa-chevron-right")
                  .addClass("fa-chevron-down");
              });
            }
          });
        }, 200);
      });

      $("#opcua-bc-search-clear").on("click", function () {
        $("#opcua-bc-search").val("").trigger("input");
      });

      // ─── Expand / Collapse All ───

      $("#opcua-bc-expand-all").on("click", function () {
        $("#opcua-bc-tree .opcua-bc-children").each(function () {
          $(this).show();
          $(this)
            .prev(".opcua-bc-tree-item")
            .find(".opcua-bc-expand .fa")
            .removeClass("fa-chevron-right")
            .addClass("fa-chevron-down");
        });
      });

      $("#opcua-bc-collapse-all").on("click", function () {
        $("#opcua-bc-tree .opcua-bc-children").each(function () {
          $(this).hide();
          $(this)
            .prev(".opcua-bc-tree-item")
            .find(".opcua-bc-expand .fa")
            .removeClass("fa-chevron-down")
            .addClass("fa-chevron-right");
        });
      });

      // ─── Browse ───

      var currentEndpointId = null;

      $("#opcua-bc-browse-btn").on("click", function () {
        var endpointId = $("#node-input-endpoint").val();
        if (!endpointId || endpointId === "_ADD_") {
          RED.notify("Please select an endpoint first", "warning");
          return;
        }
        currentEndpointId = endpointId;
        $("#opcua-bc-tree").empty();
        $("#opcua-bc-search").val("");
        $("#opcua-bc-status")
          .html('<i class="fa fa-spinner fa-spin"></i> Connecting to server...')
          .show();
        $("#opcua-bc-error").hide();
        browseNode(endpointId, null, $("#opcua-bc-tree"), 0, null);
      });

      function browseNode(endpointId, nodeId, $container, depth, parentRef) {
        $.ajax({
          url: "opcua-browse-client/browse",
          type: "POST",
          contentType: "application/json",
          data: JSON.stringify({ endpointId: endpointId, nodeId: nodeId }),
          success: function (data) {
            $("#opcua-bc-status").hide();
            $container.find("> .opcua-bc-loading").remove();
            var refs = data.references || [];
            renderBrowseResult(endpointId, refs, $container, depth);
            if (data.extensionFields && data.extensionFields.length > 0) {
              renderExtensionFields(
                data.extensionFields,
                $container,
                depth,
                parentRef,
              );
            }
            if (depth === 0) {
              $("#opcua-bc-tree-toolbar").show();
            }
          },
          error: function (xhr) {
            $("#opcua-bc-status").hide();
            $container.find("> .opcua-bc-loading").remove();
            var msg = xhr.responseJSON
              ? xhr.responseJSON.error
              : "Connection failed";
            if (depth === 0) {
              $("#opcua-bc-error").text(msg).show();
            } else {
              $container.append(
                '<div class="opcua-bc-loading" style="color:#d9534f"><i class="fa fa-exclamation-triangle"></i> ' +
                  $("<span>").text(msg).html() +
                  "</div>",
              );
            }
          },
        });
      }

      function renderExtensionFields(fields, $container, depth, parentRef) {
        var parentNodeId = parentRef ? parentRef.nodeId : null;

        fields.forEach(function (field) {
          var $item = $(
            '<div class="opcua-bc-tree-item" style="padding-left:' +
              depth * 20 +
              'px"></div>',
          );
          $item.attr(
            "title",
            field.browseName +
              " (field of " +
              (parentNodeId || "ExtensionObject") +
              ")",
          );

          // No expand arrow
          $item.append(
            '<span class="opcua-bc-expand"><span style="width:14px;display:inline-block"></span></span>',
          );

          // No checkbox — virtual fields extracted from value, not individually subscribable
          $item.append('<span style="width:19px;display:inline-block"></span>');

          // Icon
          $item.append(
            '<i class="fa fa-tag opcua-bc-node-icon" style="color:#2e9e5a;opacity:0.7"></i>',
          );

          // Field name
          var $label = $(
            '<span class="opcua-bc-node-label opcua-bc-variable"></span>',
          );
          $label.text(field.displayName || field.browseName);
          $item.append($label);

          // DataType badge
          if (field.dataType) {
            $item.append(
              '<span class="opcua-bc-datatype">' +
                $("<span>").text(field.dataType).html() +
                "</span>",
            );
          }

          // Value preview
          var valStr = "";
          if (field.value !== undefined && field.value !== null) {
            if (typeof field.value === "object") {
              try {
                valStr = JSON.stringify(field.value);
              } catch (_e) {
                valStr = String(field.value);
              }
            } else {
              valStr = String(field.value);
            }
            if (valStr.length > 80) {
              valStr = valStr.substring(0, 77) + "...";
            }
          }
          if (valStr) {
            $item.append(
              '<span class="opcua-bc-node-id-inline" style="color:#888;font-style:italic" title="Current value: ' +
                $("<span>").text(valStr).html() +
                '">= ' +
                $("<span>").text(valStr).html() +
                "</span>",
            );
          }

          // "Field" badge
          $item.append(
            '<span class="opcua-bc-node-class" style="color:#999;border-color:#ccc">Field</span>',
          );

          $container.append($item);
        });
      }

      function renderBrowseResult(endpointId, references, $container, depth) {
        if (!references || references.length === 0) {
          if (depth === 0) {
            $container.html('<div class="opcua-bc-empty">No nodes found</div>');
          }
          return;
        }

        references.forEach(function (ref) {
          var meta = getMeta(ref.nodeClass);
          var hasChildren = ref.hasChildren;
          var isChecked = !!selectedMap[ref.nodeId];

          var $item = $(
            '<div class="opcua-bc-tree-item" style="padding-left:' +
              depth * 20 +
              'px"></div>',
          );
          $item.attr("title", ref.nodeId);

          // Expand arrow
          var $expand = $('<span class="opcua-bc-expand"></span>');
          if (hasChildren) {
            $expand.html('<i class="fa fa-chevron-right"></i>');
            $expand.addClass("opcua-bc-expandable");
          } else {
            $expand.html(
              '<span style="width:14px;display:inline-block"></span>',
            );
          }
          $item.append($expand);

          // Checkbox — ALL node types get one
          var $cb = $('<input type="checkbox" class="opcua-bc-checkbox">');
          $cb.attr("data-nodeid", ref.nodeId);
          $cb.prop("checked", isChecked);
          $cb.on("change", function (e) {
            e.stopPropagation();
            if (this.checked) {
              selectedMap[ref.nodeId] = {
                nodeId: ref.nodeId,
                browseName: ref.browseName,
                displayName: ref.displayName,
                nodeClass: ref.nodeClass,
                typeDefinition: ref.typeDefinition || "",
                dataType: ref.dataType || "",
              };
            } else {
              delete selectedMap[ref.nodeId];
            }
            updateSelectedCount();
          });
          $item.append($cb);

          // If this Variable holds an ExtensionObject, override icon/color/badge
          var isExtObj = isExtensionObject(ref);
          var displayMeta = isExtObj ? nodeClassMeta["ExtensionObject"] : meta;
          var displayClass = isExtObj ? "ExtensionObject" : ref.nodeClass;

          // Icon
          $item.append(
            '<i class="fa ' +
              displayMeta.icon +
              ' opcua-bc-node-icon" style="color:' +
              displayMeta.color +
              '"></i>',
          );

          // Label
          var $label = $('<span class="opcua-bc-node-label"></span>');
          $label.text(ref.displayName || ref.browseName);
          if (ref.nodeClass === "Variable" && !isExtObj) {
            $label.addClass("opcua-bc-variable");
          }
          $item.append($label);

          // DataType badge for Variables, TypeDefinition for Objects
          var extraInfo = "";
          if (
            ref.dataType &&
            (ref.nodeClass === "Variable" || ref.nodeClass === "VariableType")
          ) {
            extraInfo = ref.dataType;
          } else if (ref.typeDefinition && ref.nodeClass === "Object") {
            // Clean up typeDefinition (e.g. "ns=0;i=61" -> "FolderType" or show raw)
            var td = ref.typeDefinition;
            extraInfo = td.replace(/^ns=0;i=/, "i=");
          }
          if (extraInfo) {
            $item.append(
              '<span class="opcua-bc-datatype">' +
                $("<span>").text(extraInfo).html() +
                "</span>",
            );
          }

          // NodeId (small, inline)
          $item.append(
            '<span class="opcua-bc-node-id-inline">' +
              $("<span>").text(ref.nodeId).html() +
              "</span>",
          );

          // NodeClass badge — show "ExtensionObject" instead of "Variable" when applicable
          var badgeColor = displayMeta.color;
          $item.append(
            '<span class="opcua-bc-node-class" style="color:' +
              badgeColor +
              ";border-color:" +
              badgeColor +
              '">' +
              displayClass +
              "</span>",
          );

          // Toggle-select-children button for expandable nodes
          if (hasChildren) {
            var $selectAll = $(
              '<span class="opcua-bc-select-children" title="Toggle select all direct children"><i class="fa fa-check-square-o"></i></span>',
            );
            $selectAll.on("click", function (e) {
              e.stopPropagation();
              var $childContainer = $item.next(".opcua-bc-children");
              if (!$childContainer.length) return;
              var $cbs = $childContainer.find(
                "> .opcua-bc-tree-item .opcua-bc-checkbox",
              );
              // If all are checked -> uncheck all, otherwise check all
              var allChecked = true;
              $cbs.each(function () {
                if (!this.checked) allChecked = false;
              });
              var newState = !allChecked;
              $cbs.each(function () {
                if (this.checked !== newState) {
                  $(this).prop("checked", newState).trigger("change");
                }
              });
            });
            $item.append($selectAll);
          }

          $container.append($item);

          // Children container (lazy loaded)
          if (hasChildren) {
            var $children = $(
              '<div class="opcua-bc-children" style="display:none"></div>',
            );
            $container.append($children);
            var loaded = false;

            function toggleExpand() {
              var $icon = $expand.find(".fa");
              if ($children.is(":visible")) {
                $children.slideUp(150);
                $icon
                  .removeClass("fa-chevron-down")
                  .addClass("fa-chevron-right");
              } else {
                if (!loaded) {
                  loaded = true;
                  $children.html(
                    '<div class="opcua-bc-loading"><i class="fa fa-spinner fa-spin"></i> Loading...</div>',
                  );
                  $children.slideDown(150);
                  browseNode(endpointId, ref.nodeId, $children, depth + 1, ref);
                } else {
                  $children.slideDown(150);
                }
                $icon
                  .removeClass("fa-chevron-right")
                  .addClass("fa-chevron-down");
              }
            }

            $expand.on("click", toggleExpand);
            $label.on("dblclick", toggleExpand);
          }
        });
      }

      updateSelectedCount();
    },
    oneditsave: function () {
      // Read directly from the authoritative selectedMap (no DOM scraping)
      this.selectedItems = Object.values(this._selectedMap || {});
    },
    oneditcancel: function () {
      // Disconnect browse session on cancel
      var endpointId = this.endpoint;
      if (endpointId) {
        $.ajax({
          url: "opcua-browse-client/disconnect",
          type: "POST",
          contentType: "application/json",
          data: JSON.stringify({ endpointId: endpointId }),
        });
      }
    },
  });
</script>

<style>
  /* ─── Browse Client Styles ─── */
  .opcua-bc-container {
    font-family:
      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .opcua-bc-container .form-row label {
    font-weight: 500;
    color: #444;
  }

  /* Browse header */
  .opcua-bc-browse-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 14px 0 8px;
  }
  .opcua-bc-browse-header h4 {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
    color: #333;
    flex: 1;
  }
  .opcua-bc-selected-badge {
    background: #2e9e5a;
    color: white;
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 600;
    display: none;
  }
  .opcua-bc-browse-btn {
    white-space: nowrap;
  }

  /* Tree toolbar */
  .opcua-bc-tree-toolbar {
    display: flex;
    gap: 4px;
    margin-bottom: 4px;
  }
  .opcua-bc-tree-toolbar button {
    font-size: 11px;
  }

  /* Search bar */
  .opcua-bc-search-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 6px;
  }
  .opcua-bc-search-row input {
    flex: 1;
    border-radius: 4px;
    font-size: 12px;
    padding: 4px 8px;
    border: 1px solid #ddd;
  }
  .opcua-bc-search-row input:focus {
    border-color: #3a8cba;
    outline: none;
    box-shadow: 0 0 0 2px rgba(58, 140, 186, 0.15);
  }
  .opcua-bc-search-clear {
    border: none;
    background: none;
    color: #aaa;
    cursor: pointer;
    padding: 2px 6px;
    font-size: 14px;
  }
  .opcua-bc-search-clear:hover {
    color: #555;
  }

  /* Tree container */
  #opcua-bc-tree {
    border: 1px solid #ddd;
    border-radius: 6px;
    max-height: 400px;
    overflow-y: auto;
    overflow-x: auto;
    background: #fafbfc;
    padding: 4px 0;
    min-height: 60px;
  }
  .opcua-bc-tree-item {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    cursor: default;
    font-size: 12px;
    white-space: nowrap;
    transition: background 0.1s;
  }
  .opcua-bc-tree-item:hover {
    background: #edf2f7;
  }

  /* Expand arrow */
  .opcua-bc-expand {
    width: 16px;
    text-align: center;
    flex-shrink: 0;
    font-size: 10px;
    color: #888;
  }
  .opcua-bc-expandable {
    cursor: pointer;
  }
  .opcua-bc-expandable:hover {
    color: #333;
  }

  /* Checkbox */
  .opcua-bc-checkbox {
    width: auto !important;
    margin: 0 !important;
    flex-shrink: 0;
    cursor: pointer;
  }

  /* Node icon */
  .opcua-bc-node-icon {
    font-size: 12px;
    flex-shrink: 0;
    width: 14px;
    text-align: center;
  }

  /* Node label */
  .opcua-bc-node-label {
    color: #333;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
  }
  .opcua-bc-node-label.opcua-bc-variable {
    font-weight: 500;
    color: #1a6e3a;
  }

  /* Inline NodeId */
  .opcua-bc-node-id-inline {
    font-size: 10px;
    color: #b0b0b0;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-left: 4px;
  }

  /* Node class badge */
  .opcua-bc-node-class {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    border: 1px solid;
    background: white;
    font-weight: 500;
  }

  /* DataType badge */
  .opcua-bc-datatype {
    font-size: 9px;
    color: #888;
    background: #f0f4e8;
    border: 1px solid #d5dcc8;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    font-style: italic;
  }

  /* Select-all-children button */
  .opcua-bc-select-children {
    font-size: 11px;
    color: #bbb;
    cursor: pointer;
    padding: 0 3px;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .opcua-bc-select-children:hover {
    color: #2e9e5a;
  }

  /* Loading / Empty / Error */
  .opcua-bc-loading {
    padding: 6px 20px;
    font-size: 11px;
    color: #888;
  }
  .opcua-bc-empty {
    padding: 12px 16px;
    font-size: 12px;
    color: #999;
    text-align: center;
  }
  #opcua-bc-status {
    padding: 8px 12px;
    font-size: 12px;
    color: #3a8cba;
    display: none;
  }
  #opcua-bc-error {
    padding: 8px 12px;
    font-size: 12px;
    color: #d9534f;

<script type="text/html" data-help-name="opcua-browse-client">
  <p>Experimental OPC UA Client with built-in address space browser.</p>

  <h3>How to Use</h3>
  <ol>
    <li>Select an <b>Endpoint</b> configuration</li>
    <li><b>Deploy</b> once (so the endpoint is available for browsing)</li>
    <li>Click <b>Browse</b> to load the server's address space tree</li>
    <li>
      Expand folders and <b>check</b> any node you want (Variable, Object,
      Method, ...)
    </li>
    <li>
      Use the <b>select-all</b> button (<i class="fa fa-check-square-o"></i>) on
      folders to select all direct children
    </li>
    <li>Use the <b>search bar</b> to filter by name or NodeId</li>
    <li>Choose <b>Read</b> or <b>Subscribe</b> mode</li>
    <li>Deploy again to activate</li>
  </ol>

  <h3>Supported Node Types</h3>
  <p>All OPC UA node classes can be selected:</p>
  <ul>
    <li><b>Variable</b> — Read values, subscribe to changes</li>
    <li><b>Object</b> — Read attributes, monitor events</li>
    <li><b>Method</b> — Included in selection for reference</li>
    <li><b>ObjectType, VariableType, ReferenceType, DataType, View</b></li>
  </ul>

  <h3>Modes</h3>
  <dl>
    <dt>Read (on trigger)</dt>
    <dd>
      Send any message to read all selected nodes at once. Output:
      <code>msg.payload</code> = Array of results.
    </dd>
    <dt>Subscribe (live updates)</dt>
    <dd>
      Automatically subscribes on connect. Each value change emits a message.
    </dd>
  </dl>

  <h3>Operations via msg.operation</h3>
  <ul>
    <li><code>read</code> — Read all selected items</li>
    <li><code>subscribe</code> — Start subscriptions</li>
    <li><code>unsubscribe</code> — Stop all subscriptions</li>
  </ul>

  <h3>Output</h3>
  <p>
    <b>Read:</b> <code>msg.payload</code> = Array of
    <code
      >{nodeId, value, browseName, displayName, nodeClass, statusCode,
      ...}</code
    >
  </p>
  <p>
    <b>Subscribe:</b> One message per change: <code>msg.payload</code> = value,
    <code>msg.nodeId</code>, <code>msg.nodeClass</code>
  </p>
</script>
